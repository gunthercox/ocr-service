name: Build and Push Tagged Release

permissions:
  contents: read

on:
  release:
    types: [published] # Triggers when a release is published in GitHub

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: tesseract
            suffix: -tesseract
          - target: paddleocr
            suffix: -paddleocr
          - target: all
            suffix: ""
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Automatically extracts tags/labels from the GitHub release event
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/ocr-service
          flavor: |
            suffix=${{ matrix.suffix }},onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push ${{ matrix.target }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          target: ${{ matrix.target }}
          tags: ${{ steps.meta.outputs.tags }} # Uses the tags generated above
          labels: ${{ steps.meta.outputs.labels }}
